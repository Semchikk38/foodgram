server {
    listen 80;
    server_name foodgram.servequake.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name foodgram.servequake.com;

    ssl_certificate /etc/letsencrypt/live/foodgram.servequake.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foodgram.servequake.com/privkey.pem;
    #include /etc/letsencrypt/options-ssl-nginx.conf;
    #ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        root /var/html/;
    }

    location /s/ {
        rewrite ^/s/([0-9]+)/?$ /recipes/$1 permanent;
    }

    location /django-static/ {
        alias /var/html/static/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
}
