version: '3.3'
services:

  db:
    image: postgres:13.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ../backend/.env
    restart: always

  backend:
    build: ../backend
    restart: always
    volumes:
      - static_backend:/app/static/
      - media_value:/app/media/
      - ../data/:/app/data/
    depends_on:
      - db
    env_file:
      - ../backend/.env

  frontend:
    build: ../frontend
    volumes:
      - frontend_build:/app/build

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/build:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static_backend:/var/html/static/
      - media_value:/var/html/media/
      - /etc/letsencrypt/live/foodgram.myftp.biz/fullchain.pem:/etc/letsencrypt/live/foodgram.myftp.biz/fullchain.pem:ro
      - /etc/letsencrypt/live/foodgram.myftp.biz/privkey.pem:/etc/letsencrypt/live/foodgram.myftp.biz/privkey.pem:ro
      - /etc/letsencrypt/options-ssl-nginx.conf:/etc/letsencrypt/options-ssl-nginx.conf:ro
      - /etc/letsencrypt/ssl-dhparams.pem:/etc/letsencrypt/ssl-dhparams.pem:ro
    restart: always

volumes:
  postgres_data:
  static_backend:
  media_value:
  frontend_build:
